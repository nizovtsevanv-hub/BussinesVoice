<script>
(function () {
  'use strict';

  const STORAGE_KEYS = {
    completedLessons: 'vykb_completedLessons',
    savedAnswers: 'vykb_savedAnswers',
    scenarioAnswers: 'vykb_scenarioAnswers',
    settings: 'vykb_settings',
    progress: 'vykb_progress'
  };

  const SKILL_TAGS = ['Refusal', 'Clarification', 'Disagreement', 'Argumentation', 'Summarizing', 'Voice', 'Difficult talk'];

  let state = {
    currentScreen: 'home',
    currentLesson: null,
    currentScenario: null,
    scenarioMode: 'diplomatic',
    currentAskResult: null,
    voicesLoaded: false,
    britishVoice: null
  };

  const defaultSettings = {
    largeText: false,
    highContrast: false,
    reducedMotion: false,
    readAloud: true,
    languageMode: 'ru',
    contentLang: 'ru'
  };

  function loadJSON(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch (e) {
      return fallback;
    }
  }

  function saveJSON(key, value) {
    localStorage.setItem(key, JSON.stringify(value));
  }

  function getSettings() {
    return Object.assign({}, defaultSettings, loadJSON(STORAGE_KEYS.settings, {}));
  }

  function getProgress() {
    return Object.assign({ weeklyGoal: 3, weeklyDone: 0, streak: 1, lastVisit: null }, loadJSON(STORAGE_KEYS.progress, {}));
  }

  function getCompletedLessons() {
    return loadJSON(STORAGE_KEYS.completedLessons, []);
  }

  function getSavedAnswers() {
    return loadJSON(STORAGE_KEYS.savedAnswers, []);
  }

  function getScenarioAnswers() {
    return loadJSON(STORAGE_KEYS.scenarioAnswers, {});
  }

  function t(ru, en) {
    const s = getSettings();
    const lang = s.contentLang || 'ru';
    if (lang === 'en') return en || ru;
    if (s.languageMode === 'ru+en' && en) {
      return ru + '<div class="en-block">' + en + '</div>';
    }
    return ru;
  }

  function bookBadge(bookId) {
    const b = BOOKS[bookId];
    if (!b) return '';
    return '<div class="book-badge"><strong>Матчасть:</strong> ' + b.author + ' — «' + b.title + '»<br><em>' + b.keyIdea + '</em></div>';
  }

  function booksBadges(ids) {
    return ids.map(id => bookBadge(id)).join('');
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function () { el.classList.remove('show'); }, 2500);
  }

  function calcProgressPercent() {
    const lessons = getCompletedLessons().length;
    const scenarios = Object.keys(getScenarioAnswers()).length;
    return Math.round(((lessons / 10) + (scenarios / 6)) / 2 * 100);
  }

  function updateStreak() {
    const p = getProgress();
    const today = new Date().toISOString().slice(0, 10);
    if (p.lastVisit === today) return;
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    if (p.lastVisit === yesterday) p.streak = (p.streak || 1) + 1;
    else if (p.lastVisit !== today) p.streak = 1;
    p.lastVisit = today;
    saveJSON(STORAGE_KEYS.progress, p);
  }

  function applySettings() {
    const s = getSettings();
    document.body.classList.toggle('large-text', s.largeText);
    document.body.classList.toggle('high-contrast', s.highContrast);
    document.body.classList.toggle('reduced-motion', s.reducedMotion);
    const toggle = document.getElementById('langToggle');
    if (toggle) toggle.textContent = (s.contentLang === 'en') ? 'EN' : 'RU';
  }

  function wrapCriticalWords(text, words) {
    if (!words || !words.length) return text;
    const s = getSettings();
    if (s.contentLang !== 'en' && s.languageMode !== 'ru+en') return text;
    let result = text;
    words.forEach(function (w) {
      const re = new RegExp('\\b(' + w.word + ')\\b', 'gi');
      result = result.replace(re, function (match) {
        return '<button type="button" class="word-chip" data-word="' + w.word + '" data-ipa="' + w.ipa + '">' + match + '</button>';
      });
    });
    return result;
  }

  function initSpeech() {
    if (!('speechSynthesis' in window)) {
      const banner = document.getElementById('speech-banner');
      banner.style.display = 'block';
      banner.textContent = 'Озвучка недоступна: ваш браузер не поддерживает Web Speech API.';
      return;
    }
    function loadVoices() {
      const voices = speechSynthesis.getVoices();
      state.britishVoice = voices.find(function (v) { return v.lang.startsWith('en-GB'); })
        || voices.find(function (v) { return /UK|British|Daniel|Samantha/i.test(v.name); })
        || voices.find(function (v) { return v.lang.startsWith('en'); });
      state.voicesLoaded = true;
      const banner = document.getElementById('speech-banner');
      if (getSettings().contentLang === 'en' && state.britishVoice && !state.britishVoice.lang.startsWith('en-GB')) {
        banner.style.display = 'block';
        banner.textContent = 'Британский голос недоступен в вашем браузере; используется резервный English voice.';
      } else {
        banner.style.display = 'none';
      }
    }
    loadVoices();
    speechSynthesis.onvoiceschanged = loadVoices;
  }

  function speak(text, lang) {
    const s = getSettings();
    if (!s.readAloud || !('speechSynthesis' in window)) return;
    const clean = text.replace(/<[^>]+>/g, '');
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(clean);
    const isEn = lang === 'en' || (lang !== 'ru' && getSettings().contentLang === 'en');
    u.lang = isEn ? 'en-GB' : 'ru-RU';
    if (isEn && state.britishVoice) u.voice = state.britishVoice;
    u.rate = 0.92;
    speechSynthesis.speak(u);
  }

  function showWordPopover(word, ipa, x, y) {
    const pop = document.getElementById('word-popover');
    document.getElementById('popover-word').textContent = word;
    document.getElementById('popover-ipa').textContent = ipa;
    pop.hidden = false;
    pop.style.left = Math.min(x, window.innerWidth - 220) + 'px';
    pop.style.top = Math.max(y - 80, 60) + 'px';
    pop.dataset.word = word;
  }

  document.getElementById('popover-speak').addEventListener('click', function () {
    const w = document.getElementById('word-popover').dataset.word;
    if (w) speak(w, 'en');
  });

  document.addEventListener('click', function (e) {
    if (e.target.classList.contains('word-chip')) {
      e.preventDefault();
      showWordPopover(e.target.dataset.word, e.target.dataset.ipa, e.clientX, e.clientY);
      speak(e.target.dataset.word, 'en');
    } else if (!e.target.closest('#word-popover')) {
      document.getElementById('word-popover').hidden = true;
    }
  });

  function showScreen(id) {
    state.currentScreen = id;
    document.querySelectorAll('.screen').forEach(function (el) {
      el.classList.toggle('active', el.id === 'screen-' + id);
    });
    document.querySelectorAll('nav.main-nav button').forEach(function (btn) {
      btn.classList.toggle('active', btn.dataset.screen === id);
    });
    renderScreen(id);
    window.scrollTo(0, 0);
  }

  function renderScreen(id) {
    const map = { home: renderHome, ask: renderAsk, learn: renderLearn, practice: renderPractice, progress: renderProgress, settings: renderSettings };
    if (map[id]) map[id]();
  }

  function renderHome() {
    const pct = calcProgressPercent();
    const completed = getCompletedLessons();
    const nextLesson = DATA.lessons.find(function (l) { return completed.indexOf(l.id) === -1; });
    const p = getProgress();
    document.getElementById('screen-home').innerHTML =
      '<div class="card"><h2>VoiceYour KB — деловая коммуникация SSJ100</h2>' +
      '<p>' + t('Краткие практики делового общения для конструкторов и инженёров Конструкторского Бюро гражданского самолёта SSJ100.', 'Concise business communication practice for SSJ100 civil aircraft design bureau engineers and designers.') + '</p></div>' +
      '<div class="home-cards">' +
      '<div class="home-card" data-go="ask"><div class="icon">💬</div><strong>Спросить</strong><p>' + t('Ответы по коммуникации', 'Communication answers') + '</p></div>' +
      '<div class="home-card" data-go="learn"><div class="icon">📖</div><strong>Изучить</strong><p>' + t('10 микроуроков', '10 micro-lessons') + '</p></div>' +
      '<div class="home-card" data-go="practice"><div class="icon">🎯</div><strong>Отработать</strong><p>' + t('6 сценариев', '6 scenarios') + '</p></div></div>' +
      '<div class="card"><h3>' + t('Недельная цель', 'Weekly goal') + '</h3><p>' + p.weeklyDone + ' / ' + p.weeklyGoal + ' ' + t('занятий', 'sessions') + '</p>' +
      '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:' + Math.min(100, pct) + '%"></div></div>' +
      '<p><strong>' + pct + '%</strong> ' + t('общего прогресса', 'overall progress') + '</p></div>' +
      '<div class="card"><h3>' + t('Продолжить обучение', 'Continue learning') + '</h3>' +
      (nextLesson ? '<p>' + t('Следующий урок:', 'Next lesson:') + ' <strong>' + (getSettings().contentLang === 'en' ? nextLesson.titleEn : nextLesson.title) + '</strong></p>' +
        '<button class="btn btn-primary" id="continueBtn">' + t('Перейти к уроку', 'Go to lesson') + '</button>' :
        '<p>' + t('Все уроки завершены! Перейдите к сценариям.', 'All lessons complete! Proceed to scenarios.') + '</p>') + '</div>';

    document.querySelectorAll('.home-card').forEach(function (c) {
      c.onclick = function () { showScreen(c.dataset.go); };
    });
    const cb = document.getElementById('continueBtn');
    if (cb && nextLesson) {
      cb.onclick = function () { state.currentLesson = nextLesson.id; showScreen('learn'); renderLessonDetail(nextLesson.id); };
    }
  }

  function renderAsk() {
    document.getElementById('screen-ask').innerHTML =
      '<div class="card"><h2>' + t('Спросить', 'Ask') + '</h2>' +
      '<p>' + t('Задайте вопрос о деловой коммуникации в КБ SSJ100.', 'Ask about business communication in the SSJ100 design bureau.') + '</p>' +
      '<input type="text" id="askInput" placeholder="' + t('Например: как отказать в срочной доработке КД?', 'E.g.: how to refuse urgent documentation revision?') + '">' +
      '<button class="btn btn-primary btn-block" id="askSubmit">' + t('Получить ответ', 'Get answer') + '</button>' +
      '<div id="askResult"></div></div>';

    document.getElementById('askSubmit').onclick = submitAsk;
    document.getElementById('askInput').addEventListener('keydown', function (e) { if (e.key === 'Enter') submitAsk(); });
  }

  function submitAsk() {
    const q = document.getElementById('askInput').value.trim().toLowerCase();
    if (!q) { toast(t('Введите вопрос', 'Enter a question')); return; }
    let best = null, bestScore = 0;
    DATA.ask.forEach(function (a) {
      let score = 0;
      a.keywords.forEach(function (kw) { if (q.indexOf(kw) !== -1) score++; });
      if (score > bestScore) { bestScore = score; best = a; }
    });
    if (!best || bestScore === 0) best = DATA.ask[0];
    state.currentAskResult = best;
    const lang = getSettings().contentLang;
    const ans = lang === 'en' ? best.answerEn : best.answer;
    const src = BOOKS[best.source];
    document.getElementById('askResult').innerHTML =
      '<div class="card" style="margin-top:16px"><h3>' + t('Ответ', 'Answer') + '</h3>' +
      '<p>' + ans + '</p>' + bookBadge(best.source) +
      '<p><span class="tag">' + t('Источник', 'Source') + ': ' + src.author + '</span>' +
      '<span class="confidence confidence-' + best.confidence + '">' + best.confidence + '</span></p>' +
      '<p><small>' + t('Версия', 'Version') + ' ' + best.version + ' · ' + best.date + '</small></p>' +
      '<p><em>' + best.fragmentPreview + '</em></p>' +
      '<button class="btn btn-secondary btn-sm" id="askSpeak">🔊 ' + t('Озвучить', 'Read aloud') + '</button> ' +
      '<button class="btn btn-primary btn-sm" id="askSave">' + t('Сохранить', 'Save') + '</button> ' +
      '<button class="btn btn-outline btn-sm" id="askLesson">' + t('Сделать микроурок из ответа', 'Create micro-lesson') + '</button></div>';

    document.getElementById('askSpeak').onclick = function () { speak(ans, lang); };
    document.getElementById('askSave').onclick = function () {
      const saved = getSavedAnswers();
      if (!saved.find(function (s) { return s.id === best.id; })) {
        saved.push({ id: best.id, question: best.question, answer: best.answer, date: new Date().toISOString() });
        saveJSON(STORAGE_KEYS.savedAnswers, saved);
      }
      toast(t('Ответ сохранён', 'Answer saved'));
    };
    document.getElementById('askLesson').onclick = function () {
      toast(t('Переход к разделу «Изучить»', 'Opening Learn section'));
      showScreen('learn');
    };
  }

  function renderLearn() {
    if (state.currentLesson) { renderLessonDetail(state.currentLesson); return; }
    const completed = getCompletedLessons();
    const lang = getSettings().contentLang;
    let list = '<div class="card"><h2>' + t('Изучить', 'Learn') + '</h2><ul class="lesson-list">';
    DATA.lessons.forEach(function (l) {
      const done = completed.indexOf(l.id) !== -1;
      list += '<li data-lesson="' + l.id + '" class="' + (done ? 'done' : '') + '"><span>' + (lang === 'en' ? l.titleEn : l.title) + '</span><span class="tag">' + l.skillTag + '</span></li>';
    });
    list += '</ul></div>';
    document.getElementById('screen-learn').innerHTML = list;
    document.querySelectorAll('[data-lesson]').forEach(function (li) {
      li.onclick = function () { state.currentLesson = li.dataset.lesson; renderLessonDetail(li.dataset.lesson); };
    });
  }

  function renderLessonDetail(id) {
    const l = DATA.lessons.find(function (x) { return x.id === id; });
    if (!l) return;
    const lang = getSettings().contentLang;
    const title = lang === 'en' ? l.titleEn : l.title;
    const expl = lang === 'en' ? l.explanationEn : l.explanation;
    const keyIdea = lang === 'en' ? l.keyIdeaEn : l.keyIdea;
    let qHtml = '';
    l.questions.forEach(function (q, qi) {
      const qText = lang === 'en' ? q.qEn : q.q;
      const opts = lang === 'en' ? q.optsEn : q.opts;
      qHtml += '<div class="quiz-q" data-q="' + qi + '"><p><strong>' + (qi + 1) + '.</strong> ' + qText + '</p>';
      opts.forEach(function (opt, oi) {
        qHtml += '<button type="button" class="option-btn" data-q="' + qi + '" data-opt="' + oi + '">' + opt + '</button>';
      });
      qHtml += '</div>';
    });
    const formBad = l.formulation.bad;
    const formGood = l.formulation.good;
    document.getElementById('screen-learn').innerHTML =
      '<div class="card"><button class="btn btn-secondary btn-sm" id="backLearn">← ' + t('К списку', 'Back to list') + '</button>' +
      '<h2>' + title + '</h2><span class="tag">' + l.skillTag + '</span>' +
      booksBadges(l.books) +
      '<h3>' + t('Ключевая идея', 'Key idea') + '</h3><p>' + keyIdea + '</p>' +
      '<h3>' + t('Объяснение', 'Explanation') + '</h3><p>' + wrapCriticalWords(expl, l.criticalWords) + '</p>' +
      '<pre class="schema">' + l.schema + '</pre>' +
      '<h3>' + t('Проверка', 'Retrieval practice') + '</h3>' + qHtml +
      '<h3>' + t('Мини-кейс', 'Mini-case') + '</h3><p>' + (lang === 'en' ? l.miniCaseEn : l.miniCase) + '</p>' +
      '<h3>' + t('Упражнение: переформулировка', 'Formulation exercise') + '</h3>' +
      '<p><strong>✗</strong> ' + formBad + '</p><p><strong>✓</strong> ' + formGood + '</p>' +
      '<button class="btn btn-secondary" id="lessonSpeak">🔊 ' + t('Озвучить', 'Read aloud') + '</button> ' +
      '<button class="btn btn-primary" id="completeLesson">' + t('Завершить урок', 'Complete lesson') + '</button></div>';

    document.getElementById('backLearn').onclick = function () { state.currentLesson = null; renderLearn(); };
    document.getElementById('lessonSpeak').onclick = function () { speak(title + '. ' + expl, lang); };
    document.getElementById('completeLesson').onclick = function () {
      const c = getCompletedLessons();
      if (c.indexOf(id) === -1) c.push(id);
      saveJSON(STORAGE_KEYS.completedLessons, c);
      const p = getProgress();
      p.weeklyDone = Math.min(p.weeklyGoal, (p.weeklyDone || 0) + 1);
      saveJSON(STORAGE_KEYS.progress, p);
      toast(t('Урок завершён', 'Lesson completed'));
      state.currentLesson = null;
      renderLearn();
    };
    document.querySelectorAll('.option-btn').forEach(function (btn) {
      btn.onclick = function () {
        const qi = parseInt(btn.dataset.q, 10);
        const oi = parseInt(btn.dataset.opt, 10);
        const qEl = document.querySelector('.quiz-q[data-q="' + qi + '"]');
        qEl.querySelectorAll('.option-btn').forEach(function (b) { b.classList.remove('selected'); });
        btn.classList.add('selected');
        const correct = l.questions[qi].correct;
        qEl.classList.remove('correct', 'incorrect');
        qEl.classList.add(oi === correct ? 'correct' : 'incorrect');
      };
    });
  }

  function renderPractice() {
    if (state.currentScenario) { renderScenarioDetail(state.currentScenario); return; }
    const lang = getSettings().contentLang;
    let list = '<div class="card"><h2>' + t('Отработать', 'Practice') + '</h2><ul class="scenario-list">';
    DATA.scenarios.forEach(function (s) {
      list += '<li data-scenario="' + s.id + '"><span>' + (lang === 'en' ? s.titleEn : s.title) + '</span></li>';
    });
    list += '</ul></div>';
    document.getElementById('screen-practice').innerHTML = list;
    document.querySelectorAll('[data-scenario]').forEach(function (li) {
      li.onclick = function () { state.currentScenario = li.dataset.scenario; renderScenarioDetail(li.dataset.scenario); };
    });
  }

  function renderScenarioDetail(id) {
    const s = DATA.scenarios.find(function (x) { return x.id === id; });
    if (!s) return;
    const lang = getSettings().contentLang;
    const mode = state.scenarioMode;
    let optHtml = '';
    s.options.forEach(function (o, i) {
      optHtml += '<button type="button" class="option-btn scenario-opt" data-i="' + i + '">' + (lang === 'en' ? o.textEn : o.text) + '</button><div class="feedback hidden" data-fb="' + i + '"></div>';
    });
    let phrases = '';
    s.phraseBank.forEach(function (p) {
      phrases += '<li>' + p.ru + (getSettings().languageMode === 'ru+en' || lang === 'en' ? '<div class="en">' + p.en + '</div>' : '') + '</li>';
    });
    const rec = s.recommended[mode];
    const recEn = s.recommendedEn[mode];
    document.getElementById('screen-practice').innerHTML =
      '<div class="card"><button class="btn btn-secondary btn-sm" id="backPractice">← ' + t('К списку', 'Back') + '</button>' +
      '<h2>' + (lang === 'en' ? s.titleEn : s.title) + '</h2>' + booksBadges(s.books) +
      '<p><strong>' + t('Техника', 'Technique') + ':</strong> ' + s.technique + '</p>' +
      '<h3>' + t('Ситуация', 'Situation') + '</h3><p>' + (lang === 'en' ? s.situationEn : s.situation) + '</p>' +
      '<p><strong>' + t('Ваша роль', 'Your role') + ':</strong> ' + (lang === 'en' ? s.userRoleEn : s.userRole) + '</p>' +
      '<p><strong>' + t('Собеседник', 'Counterpart') + ':</strong> ' + (lang === 'en' ? s.counterpartRoleEn : s.counterpartRole) + '</p>' +
      '<p><strong>' + t('Цель', 'Objective') + ':</strong> ' + (lang === 'en' ? s.objectiveEn : s.objective) + '</p>' +
      '<p><strong>' + t('Ограничения', 'Constraints') + ':</strong> ' + (lang === 'en' ? s.constraintsEn : s.constraints) + '</p>' +
      '<div class="mode-tabs"><button class="mode-tab' + (mode === 'soft' ? ' active' : '') + '" data-mode="soft">' + t('Мягкий', 'Soft') + '</button>' +
      '<button class="mode-tab' + (mode === 'direct' ? ' active' : '') + '" data-mode="direct">' + t('Прямой', 'Direct') + '</button>' +
      '<button class="mode-tab' + (mode === 'diplomatic' ? ' active' : '') + '" data-mode="diplomatic">' + t('Дипломатичный', 'Diplomatic') + '</button></div>' +
      '<h3>' + t('Выберите ответ', 'Choose response') + '</h3>' + optHtml +
      '<h3>' + t('Рекомендуемый ответ', 'Recommended answer') + ' (' + mode + ')</h3><p>' + rec + '</p>' +
      (getSettings().languageMode === 'ru+en' ? '<div class="en-block">' + recEn + '</div>' : '') +
      '<h3>' + t('Банк фраз', 'Phrase bank') + '</h3><ul class="phrase-bank">' + phrases + '</ul>' +
      '<button class="btn btn-primary" id="saveScenario">' + t('Сохранить лучший ответ', 'Save best answer') + '</button></div>';

    document.getElementById('backPractice').onclick = function () { state.currentScenario = null; renderPractice(); };
    document.querySelectorAll('.mode-tab').forEach(function (tab) {
      tab.onclick = function () { state.scenarioMode = tab.dataset.mode; renderScenarioDetail(id); };
    });
    document.querySelectorAll('.scenario-opt').forEach(function (btn) {
      btn.onclick = function () {
        const i = parseInt(btn.dataset.i, 10);
        const fb = lang === 'en' ? s.options[i].feedbackEn : s.options[i].feedback;
        document.querySelectorAll('.feedback').forEach(function (f) { f.classList.add('hidden'); });
        const fel = document.querySelector('.feedback[data-fb="' + i + '"]');
        fel.textContent = fb;
        fel.classList.remove('hidden');
      };
    });
    document.getElementById('saveScenario').onclick = function () {
      const ans = getScenarioAnswers();
      ans[id] = { mode: mode, text: rec, date: new Date().toISOString() };
      saveJSON(STORAGE_KEYS.scenarioAnswers, ans);
      toast(t('Ответ сохранён', 'Answer saved'));
    };
  }

  function renderProgress() {
    const pct = calcProgressPercent();
    const completed = getCompletedLessons();
    const saved = getSavedAnswers();
    const scenarios = getScenarioAnswers();
    const p = getProgress();
    let skills = '';
    SKILL_TAGS.forEach(function (sk) {
      const lessonDone = DATA.lessons.some(function (l) { return l.skillTag === sk && completed.indexOf(l.id) !== -1; });
      skills += '<div class="skill-item' + (lessonDone ? ' complete' : '') + '">' + sk + '</div>';
    });
    const nextLesson = DATA.lessons.find(function (l) { return completed.indexOf(l.id) === -1; });
    const nextScenario = DATA.scenarios.find(function (s) { return !scenarios[s.id]; });
    document.getElementById('screen-progress').innerHTML =
      '<div class="card"><h2>' + t('Прогресс', 'Progress') + '</h2>' +
      '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>' +
      '<p><strong>' + pct + '%</strong></p>' +
      '<p>' + t('Завершено уроков', 'Lessons completed') + ': ' + completed.length + ' / 10</p>' +
      '<p>' + t('Сохранённых ответов', 'Saved answers') + ': ' + saved.length + '</p>' +
      '<p>' + t('Сценариев отработано', 'Scenarios practiced') + ': ' + Object.keys(scenarios).length + ' / 6</p>' +
      '<p>' + t('Недельная цель', 'Weekly goal') + ': ' + p.weeklyDone + ' / ' + p.weeklyGoal + '</p>' +
      '<p>' + t('Серия (streak)', 'Streak') + ': ' + (p.streak || 1) + ' ' + t('дн.', 'days') + '</p></div>' +
      '<div class="card"><h3>' + t('Карта навыков', 'Skill map') + '</h3><div class="skill-map">' + skills + '</div></div>' +
      '<div class="card"><h3>' + t('Следующее действие', 'Next recommended action') + '</h3>' +
      (nextLesson ? '<p>' + t('Урок', 'Lesson') + ': ' + nextLesson.title + '</p><button class="btn btn-primary" id="goLesson">' + t('Начать', 'Start') + '</button>' :
        nextScenario ? '<p>' + t('Сценарий', 'Scenario') + ': ' + nextScenario.title + '</p><button class="btn btn-primary" id="goScenario">' + t('Начать', 'Start') + '</button>' :
          '<p>' + t('Отличная работа! Повторите сложные сценарии.', 'Excellent! Review challenging scenarios.') + '</p>') + '</div>';

    const gl = document.getElementById('goLesson');
    if (gl) gl.onclick = function () { state.currentLesson = nextLesson.id; showScreen('learn'); };
    const gs = document.getElementById('goScenario');
    if (gs) gs.onclick = function () { state.currentScenario = nextScenario.id; showScreen('practice'); };
  }

  function renderSettings() {
    const s = getSettings();
    document.getElementById('screen-settings').innerHTML =
      '<div class="card"><h2>' + t('Настройки', 'Settings') + '</h2>' +
      toggleRow(t('Крупный текст', 'Large text'), 'largeText', s.largeText) +
      toggleRow(t('Высокий контраст', 'High contrast'), 'highContrast', s.highContrast) +
      toggleRow(t('Уменьшить анимацию', 'Reduced motion'), 'reducedMotion', s.reducedMotion) +
      toggleRow(t('Озвучка', 'Read-aloud'), 'readAloud', s.readAloud) +
      '<div class="toggle-row"><span>' + t('Режим языка', 'Language mode') + '</span>' +
      '<select id="langMode"><option value="ru"' + (s.languageMode === 'ru' ? ' selected' : '') + '>RU</option>' +
      '<option value="en"' + (s.languageMode === 'en' ? ' selected' : '') + '>EN</option>' +
      '<option value="ru+en"' + (s.languageMode === 'ru+en' ? ' selected' : '') + '>RU+EN</option></select></div></div>';

    document.querySelectorAll('.toggle').forEach(function (tog) {
      tog.onclick = function () {
        const key = tog.dataset.key;
        const settings = getSettings();
        settings[key] = !settings[key];
        saveJSON(STORAGE_KEYS.settings, settings);
        applySettings();
        renderSettings();
      };
    });
    document.getElementById('langMode').onchange = function (e) {
      const settings = getSettings();
      settings.languageMode = e.target.value;
      settings.contentLang = e.target.value === 'en' ? 'en' : 'ru';
      saveJSON(STORAGE_KEYS.settings, settings);
      applySettings();
      renderScreen(state.currentScreen);
    };
  }

  function toggleRow(label, key, on) {
    return '<div class="toggle-row"><span>' + label + '</span><button type="button" class="toggle' + (on ? ' on' : '') + '" data-key="' + key + '" aria-pressed="' + on + '"></button></div>';
  }

  document.querySelectorAll('nav.main-nav button').forEach(function (btn) {
    btn.addEventListener('click', function () { showScreen(btn.dataset.screen); });
  });

  document.getElementById('langToggle').addEventListener('click', function () {
    const settings = getSettings();
    settings.contentLang = settings.contentLang === 'en' ? 'ru' : 'en';
    if (settings.contentLang === 'en') settings.languageMode = 'en';
    else if (settings.languageMode === 'en') settings.languageMode = 'ru';
    saveJSON(STORAGE_KEYS.settings, settings);
    applySettings();
    initSpeech();
    renderScreen(state.currentScreen);
  });

  updateStreak();
  applySettings();
  initSpeech();
  renderHome();
})();

</script>
</body>
</html>
